services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mi-rotaract-api
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "8091:8091"
    volumes:
      - uploads:/app/apps/api/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads:
